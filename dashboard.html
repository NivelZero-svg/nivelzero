<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NIVELZERO · Sistema de Gestão Interno</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#07101E; --bg2:#0D1B2E; --bg3:#132338; --bg4:#1B2F48; --bg5:#243855;
  --blue:#3B7BF8; --blue-lt:#6099FF; --orange:#F5A623; --teal:#12C2A8;
  --white:#F0F4FF; --text:#B8C8E0; --text-low:#6B82A0; --border:rgba(255,255,255,.07);
  --border2:rgba(255,255,255,.04); --shadow:0 4px 20px rgba(0,0,0,.35);
}
body{margin:0;font-family:'Montserrat',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden;}
.sidebar {width:250px;height:100vh;position:fixed;left:0;top:0;background:var(--bg2);padding:20px 0;}
.sidebar .sb-item{display:flex;align-items:center;padding:10px 20px;cursor:pointer;}
.sidebar .sb-item.active{background:rgba(18,194,168,.15);}
#sidebar.collapsed {display:none;}
.topbar{display:flex;align-items:center;justify-content:space-between;background:var(--bg2);padding:10px 20px;}
.topbar .tb-logo span{font-size:16px;color:var(--white);font-weight:600;}
.topbar button{background:none;border:none;color:var(--text);cursor:pointer;margin-left:10px;}
@media (max-width:768px) {
  .sidebar { position:absolute; left: -250px; transition:left 0.3s ease; }
  .sidebar.collapsed { left: 0; }
}
</style>
</head>
<body>
  <div id="login-screen">
    <!-- (Login form remains unchanged) -->
  </div>

  <div id="app-shell" style="display:none; flex-direction:column; min-height:100vh;">
    <nav class="sidebar" id="sidebar">
      <!-- Menu itens... -->
      <div class="sidebar-footer">
        <div class="sbp-label">Período activo</div>
        <div class="sbp-val"><span id="sidebar-active-period"></span></div>
        <div class="sbp-sub">5 clientes ativos</div>
      </div>
    </nav>
    
    <div class="topbar">
      <div class="tb-left">
        <svg><!-- Logo SVG --></svg>
        <span class="tb-logo-text">NIVEL<span>ZERO</span></span>
        <span id="tb-username">Admin</span>
        <span class="role-chip rc-admin" id="tb-role-chip">Admin</span>
      </div>
      <!-- Botão Toggle do Menu (Hambúrguer) -->
      <button id="sidebar-toggle" class="icon-btn" onclick="toggleSidebar()" title="Mostrar/Ocultar menu">☰</button>
      <button id="theme-toggle" onclick="toggleTheme()" title="Alternar tema">🌙</button>
      <button class="icon-btn" onclick="logout()" style="font-size:13px" title="Sair do sistema">🚪</button>
    </div>

    <!-- Dashboard Page -->
    <div class="page active" id="page-dashboard">
      <div class="ph">
        <div class="ph-left">
          <h1>Bom dia, <span id="tb-username">Admin</span> 👋</h1>
          <p id="dash-overview-subtitle">Visão geral do negócio — <span id="dash-month-year"></span></p>
        </div>
        <div class="ph-actions">
          <button class="btn" onclick="openReport('Receita por Período')">↓ Exportar</button>
          <button class="btn primary" onclick="openModal('new-client')">+ Novo Cliente</button>
        </div>
      </div>
      <!-- KPIs -->
      <div class="kpi">
        <div class="kpi-card"><h3>Receita Mensal <span style="font-family:montserrat;">95.500 <span style="font-size:14px;color:var(--text-low)">MZN</span></span></h3>
          <div class="kpi-sub"><span id="rev-month-year"></span> · 5 clientes</div>
        </div>
        <!-- outros KPIs -->
      </div>
      <!-- Tabela de Clientes -->
      <table id="clients-table">
        <thead><tr><th>Empresa</th><th>Pacote</th><th>Serviços</th><th>Estado</th><th>Conformidade</th><th>Responsável</th><th>Ações</th></tr></thead>
        <tbody>
          <!-- preenchido via JS (renderClients) -->
        </tbody>
      </table>
    </div>

    <!-- Outras páginas omitidas para brevidade (Clientes, Financeiro, Contratos, etc.) -->

    <!-- Página Fiscal -->
    <div class="page" id="page-fiscal">
      <h1>Calendário Fiscal</h1>
      <p id="fiscal-title">Obrigações fiscais em Moçambique — <span id="fiscal-year"></span></p>
      <!-- Conteúdo do calendário -->
    </div>
    
    <!-- Continue páginas restantes -->

  </div>

<script>
// ═══════════════════════════════════════════════════
// NIVELZERO DASHBOARD — Script atualizado

// Alterna tema claro/escuro
function toggleTheme() {
  document.body.classList.toggle('light');
}

// Alterna visibilidade da sidebar
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('collapsed');
}

// (Funções de login e navegação existentes)

// Captura de login (scripts existentes para autenticação)
// ...

// Renderização de Dashboard (existente)

// Gerenciamento de Clientes
function doAddClient() {
  const name = (document.getElementById('nc-name')||{}).value.trim();
  const nuit = (document.getElementById('nc-nuit')||{}).value.trim();
  const phone= (document.getElementById('nc-phone')||{}).value.trim();
  const email= (document.getElementById('nc-email')||{}).value.trim();
  const notes= (document.getElementById('nc-notes')||{}).value.trim();
  const value = parseInt((document.getElementById('nc-value')||{}).value||0);
  if (!name)  { toast('⚠️ Nome da empresa é obrigatório'); return; }
  if (!value) { toast('⚠️ Honorário mensal é obrigatório'); return; }
  const id = name.replace(/[^A-Za-z]/g,'').slice(0,2).toUpperCase() + Date.now().toString().slice(-3);
  const newClient = {
    id, name,
    sector:   (document.getElementById('nc-sector')||{}).value||'-',
    loc:      (document.getElementById('nc-loc')||{}).value||'',
    pkg:      (document.getElementById('nc-pkg')||{}).value||'standard',
    value,
    status:   'pending', compliance: 90,
    owner:    window._currentUserName||'Admin',
    nuit:     nuit||'', phone: phone||'', email: email||'', notes: notes||''
  };
  CLIENTS.push(newClient); saveClients();
  addAuditLog('Cliente adicionado: '+name,'doc');
  renderClients(); renderDash();
  switchClientTab('active',document.querySelector('.ph-filter.active'));
  closeModal(); toast('✅ Cliente cadastrado!');
}

// Cadastro de Serviço
function doAddService() {
  var inp = document.querySelector('#modal-body input');
  var nome = inp? inp.value.trim() : '';
  if (!nome) { toast('⚠️ Nome do serviço é obrigatório'); return; }
  SERVICES.push({name: nome, icon: '⚙️', desc:'', price:0});
  addAuditLog('Serviço adicionado: '+nome,'doc');
  renderServices();
  closeModal(); toast('✅ Serviço adicionado!');
}

// (Demais funções existentes, ex.: renderClients, renderServices, etc. permanecem)

// Atualiza datas dinâmicas após carregamento
window.addEventListener('load', () => {
  const now = new Date();
  const meses = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  const mes = meses[now.getMonth()], ano = now.getFullYear();
  document.getElementById('dash-month-year').innerText = `${mes} ${ano}`;
  document.getElementById('rev-month-year').innerText = `${mes} ${ano}`;
  document.getElementById('fiscal-year').innerText = ano;
  document.getElementById('sidebar-active-period').innerText = `${mes} ${ano}`;
});

// Função de logout (existente)
// ...

</script>
</body>
</html>
